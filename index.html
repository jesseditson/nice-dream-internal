<!doctype html>
<html class="no-js" lang="">

  <head>
    <meta charset="utf-8">
    <title>Nice Dream</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta property="og:title" content="Nice Dream">
    <meta property="og:type" content="website">
    <!-- <meta property="og:url" content=""> -->
    <!-- <meta property="og:image" content=""> -->

    
    <link rel="apple-touch-icon" href="/icon.png">
      <!-- Place favicon.ico in the root directory -->

    <link rel="stylesheet" href="/style.css">

    <meta name="theme-color" content="#fafafa">
    <link
      type="text/css"
      rel="stylesheet"
      href="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.css" />
  </head>

  <body>
    <div class="px-8 py-2">
      

<h1 id="nav" class="text-3xl font-bold flex gap-4">
  <button id="back" class="hidden">
    <i data-feather="chevron-left"></i>
  </button>
  Nice Dream
</h1>

<div id="firebaseui-auth-container"></div>

<div id="model-list" class="hidden">
  <div id="list">
    <div data-template="list" class="flex flex-col gap-4">
  <h2 class="title text-bold text-2xl">Models</h2>
  <ul class="list flex flex-col gap-2">
    <li data-template="list-item" class="px-4 py-2 flex border-b last:border-b-0">
      <button class="button flex justify-between flex-1" title="Loading...">
        <div class="name">Loading...</div>
        <i data-feather="chevron-right"></i>
      </button>
    </li>
  </ul>
</div>

  </div>
</div>

<div id="model" class="w-full hidden">
  <div id="chart" class="w-full"></div>
  <div id="channels">
    <div data-template="collection" class="flex flex-col gap-4">
  <div class="w-full flex justify-between">
    <h2 class="title text-bold text-2xl">Channels</h2>
    <button class="add">
      <i data-feather="plus-square"></i>
    </button>
  </div>
  <ul class="collection flex flex-col gap-2">
    <li data-template="collection-row" class="flex flex-col border-b last:border-b-0">
      <div class="group px-4 py-2 flex justify-between">
        <div class="name flex-1">Loading...</div>
        <div class="buttons hidden group-hover:flex gap-4">
          <button class="delete" title="delete">
            <i data-feather="trash-2"></i>
          </button>
          <button class="edit" title="edit">
            <i data-feather="edit-2"></i>
          </button>
          <button class="toggle" title="show/hide">
            <i data-feather="chevron-right"></i>
          </button>
        </div>
      </div>
      <div>
        <ul class="items hidden group px-4 py-2 flex flex-col justify-between border-b last:border-b-0">
          <li data-template="collection-item">
            <div class="name flex-1">Loading...</div>
          </li>
        </ul>
      </div>
    </li>
  </ul>
</div>

  </div>
  TODO delete button
</div>

<div id="channel" class="w-full hidden">
  <input
    id="name"
    class="text-xl text-bold"
    type="text" />
  <div id="inputs">
    <div data-template="collection" class="flex flex-col gap-4">
  <div class="w-full flex justify-between">
    <h2 class="title text-bold text-2xl">Inputs</h2>
    <button class="add">
      <i data-feather="plus-square"></i>
    </button>
  </div>
  <ul class="collection flex flex-col gap-2">
    <li data-template="collection-row" class="flex flex-col border-b last:border-b-0">
      <div class="group px-4 py-2 flex justify-between">
        <div class="name flex-1">Loading...</div>
        <div class="buttons hidden group-hover:flex gap-4">
          <button class="delete" title="delete">
            <i data-feather="trash-2"></i>
          </button>
          <button class="edit" title="edit">
            <i data-feather="edit-2"></i>
          </button>
          <button class="toggle" title="show/hide">
            <i data-feather="chevron-right"></i>
          </button>
        </div>
      </div>
      <div>
        <ul class="items hidden group px-4 py-2 flex flex-col justify-between border-b last:border-b-0">
          <li data-template="collection-item">
            <div class="name flex-1">Loading...</div>
          </li>
        </ul>
      </div>
    </li>
  </ul>
</div>

  </div>
  TODO delete button
</div>

<div id="quick-search" class="hidden w-full h-full top-0 left-0 fixed backdrop-blur-sm flex items-center justify-center z-20">
  <div id="modal" class="ring-gray-200 ring-1 rounded-lg p-1 overflow-hidden flex flex-col min-w-72 shadow-md bg-white">
    <h2 id="title" class="p-4 text-lg text-center font-bold text-gray-600"></h2>
    <input
      id="typeahead"
      class="px-5 py-3 border-b-1"
      type="text"
      incremental="true"
      autofocus="true"
      placeholder="Search..." />
    <ul id="results" class="flex flex-col gap-2">
      <li data-template="result" class="result cursor-pointer border-b-1 flex justify-between p-4">
        <div class="name"></div>
        <button class="select">
          <i data-feather="chevron-right"></i>
        </button>
      </li>
    </ul>
    <div id="create-result" class="cursor-pointer p-4"></div>
  </div>
</div>


    </div>
    <script src="/scripts/main.js" type="module"></script>
  </body>

</html>
